name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      - run: ruff check .

  test:
    name: Test & Coverage (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install system dependencies
        run: sudo apt-get install -y libcairo2-dev pkg-config python3-dev
      - run: pip install -e '.[dev]'
      - name: Run tests with coverage
        env:
          COVERAGE_FILE: ".coverage.${{ matrix.python-version }}"
        run: |
          pytest \
            -n auto \
            --cov \
            --cov-branch \
            --cov-report=term
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-data-${{ matrix.python-version }}
          path: .coverage.${{ matrix.python-version }}
          retention-days: 1

  sonarcloud:
    name: SonarCloud Analysis
    needs: test
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    if: github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install coverage

      - name: Download coverage from all matrix jobs
        uses: actions/download-artifact@v4
        with:
          path: coverage-data
      - name: List downloaded files (debug)
        run: find coverage-data -type f

      - name: Merge coverage data & generate XML
        run: |
          cp coverage-data/coverage-data-3.10/.coverage.3.10 .coverage.3.10
          cp coverage-data/coverage-data-3.11/.coverage.3.11 .coverage.3.11
          cp coverage-data/coverage-data-3.12/.coverage.3.12 .coverage.3.12
          python -m coverage combine
          python -m coverage xml

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@383f7e52eae3ab0510c3cb0e7d9d150bbaeab838
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: SonarCloud Quality Gate Check
        run: |
          echo "SonarCloud quality gate check completed"

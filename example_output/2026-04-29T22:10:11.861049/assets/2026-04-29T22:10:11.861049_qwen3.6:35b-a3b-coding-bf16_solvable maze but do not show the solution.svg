  <!-- Start marker (top-left entrance area) -->
  <circle cx="37.5" cy="37.5" r="8" fill="#27ae60" stroke="#1e8449" stroke-width="2"/>
  <text x="37.5" y="42" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#1e8449" text-anchor="middle">S</text>

  <!-- End marker (bottom-right exit area) -->

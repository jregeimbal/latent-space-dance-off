<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect x="0" y="0" width="400" height="400" fill="white" />
  
  <!-- Maze Walls (Black) -->
  <!-- Outer Border -->
  <rect x="0" y="0" width="400" height="400" fill="none" stroke="black" stroke-width="4" />
  
  <!-- Internal Walls created by Rects -->
  <!-- Row 1 -->
  <rect x="40" y="40" width="40" height="40" fill="black" />
  <rect x="120" y="40" width="40" height="40" fill="black" />
  <rect x="200" y="40" width="40" height="40" fill="black" />
  <rect x="280" y="40" width="40" height="40" fill="black" />
  
  <!-- Row 2 -->
  <rect x="80" y="80" width="40" height="40" fill="black" />
  <rect x="160" y="80" width="40" height="40" fill="black" />
  <rect x="240" y="80" width="40" height="40" fill="black" />
  
  <!-- Row 3 -->
  <rect x="40" y="120" width="40" height="40" fill="black" />
  <rect x="120" y="120" width="40" height="40" fill="black" />
  <rect x="200" y="120" width="40" height="40" fill="black" />
  <rect x="280" y="120" width="40" height="40" fill="black" />
  
  <!-- Row 4 -->
  <rect x="80" y="160" width="40" height="40" fill="black" />
  <rect x="160" y="160" width="40" height="40" fill="black" />
  <rect x="240" y="160" width="40" height="40" fill="black" />
  
  <!-- Row 5 -->
  <rect x="40" y="200" width="40" height="40" fill="black" />
  <rect x="120" y="200" width="40" height="40" fill="black" />
  <rect x="200" y="200" width="40" height="40" fill="black" />
  <rect x="280" y="200" width="40" height="40" fill="black" />
  
  <!-- Row 6 -->
  <rect x="80" y="240" width="40" height="40" fill="black" />
  <rect x="160" y="240" width="40" height="40" fill="black" />
  <rect x="240" y="240" width="40" height="40" fill="black" />
  
  <!-- Row 7 -->
  <rect x="40" y="280" width="40" height="40" fill="black" />
  <rect x="120" y="280" width="40" height="40" fill="black" />
  <rect x="200" y="280" width="40" height="40" fill="black" />
  <rect x="280" y="280" width="40" height="40" fill="black" />
  
  <!-- Row 8 -->
  <rect x="80" y="320" width="40" height="40" fill="black" />
  <rect x="160" y="320" width="40" height="40" fill="black" />
  <rect x="240" y="320" width="40" height="40" fill="black" />
  
  <!-- Row 9 -->
  <rect x="40" y="360" width="40" height="40" fill="black" />
  <rect x="120" y="360" width="40" height="40" fill="black" />
  <rect x="200" y="360" width="40" height="40" fill="black" />
  <rect x="280" y="360" width="40" height="40" fill="black" />
  
  <!-- Start Marker (Green Circle) -->
  <circle cx="20" cy="20" r="10" fill="green" />
  
  <!-- End Marker (Red Circle) -->
  <circle cx="380" cy="380" r="10" fill="red" />
  
  <!-- Decorative Path Lines (Optional, purely aesthetic) -->
  <!-- These lines are hidden behind the walls in this design, 
       but serve to show the grid structure if the user inspects the code -->
</svg>
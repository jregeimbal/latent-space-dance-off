<svg width="500" height="500" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Definitions for gradients and colors -->
  <defs>
    <linearGradient id="skinGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d2b48c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a67c52;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3" />
      <feOffset dx="2" dy="2" result="offsetblur" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background Circle -->
  <circle cx="200" cy="200" r="190" fill="#006c4a" />
  <circle cx="200" cy="200" r="185" fill="none" stroke="#004e33" stroke-width="2" />

  <!-- Ears -->
  <circle cx="110" cy="110" r="25" fill="#8b4513" stroke="#5e2f0d" stroke-width="2" />
  <circle cx="110" cy="110" r="15" fill="#cd853f" />
  <circle cx="290" cy="110" r="25" fill="#8b4513" stroke="#5e2f0d" stroke-width="2" />
  <circle cx="290" cy="110" r="15" fill="#cd853f" />

  <!-- Body/Shirt Area -->
  <!-- Main Torso -->
  <path d="M140,200 Q140,350 200,360 Q260,350 260,200 Z" fill="#8b4513" stroke="#5e2f0d" stroke-width="2" />
  
  <!-- The Shirt (Yellow) -->
  <rect x="150" y="220" width="100" height="90" rx="10" fill="#ffd700" stroke="#b8860b" stroke-width="2" />
  
  <!-- Shirt Text -->
  <text x="200" y="275" font-family="'Arial Black', sans-serif" font-size="24" font-weight="bold" 
        fill="#b22222" text-anchor="middle" letter-spacing="1">
    only you
  </text>

  <!-- Pants (Black) -->
  <path d="M150,300 L160,380 L190,380 L190,300 L210,300 L210,380 L240,380 L250,300 Z" fill="#2f4f4f" />

  <!-- Arms -->
  <!-- Left Arm holding sign -->
  <path d="M150,230 Q100,250 110,290 Q120,310 130,290 L140,250" fill="#8b4513" stroke="#5e2f0d" stroke-width="2" />
  
  <!-- The Sign Pole -->
  <line x1="100" y1="295" x2="150" y2="275" stroke="#8b4513" stroke-width="6" stroke-linecap="round" />
  
  <!-- The Sign Paper -->
  <rect x="80" y="255" width="40" height="40" rx="2" fill="white" stroke="#000" stroke-width="1" />
  <line x1="85" y1="275" x2="115" y2="275" stroke="black" stroke-width="2" />
  <line x1="100" y1="260" x2="100" y2="290" stroke="black" stroke-width="2" />

  <!-- Right Arm -->
  <path d="M250,230 Q300,250 290,290 Q280,310 270,290 L260,250" fill="#8b4513" stroke="#5e2f0d" stroke-width="2" />

  <!-- Head -->
  <ellipse cx="200" cy="150" rx="75" ry="85" fill="#8b4513" stroke="#5e2f0d" stroke-width="3" />
  
  <!-- Snout -->
  <ellipse cx="200" cy="170" rx="30" ry="22" fill="#d2b48c" />
  <ellipse cx="200" cy="162" rx="12" ry="8" fill="#2f4f4f" />
  <ellipse cx="200" cy="156" rx="5" ry="3" fill="white" />

  <!-- Mouth -->
  <path d="M200,170 L200,180 M195,182 Q200,186 205,182" stroke="#2f4f4f" stroke-width="2" fill="none" stroke-linecap="round" />

  <!-- Eyes -->
  <circle cx="170" cy="135" r="8" fill="white" />
  <circle cx="170" cy="135" r="3" fill="black" />
  
  <circle cx="230" cy="135" r="8" fill="white" />
  <circle cx="230" cy="135" r="3" fill="black" />

  <!-- Eyebrows -->
  <path d="M160,120 Q170,110 180,120" stroke="#5e2f0d" stroke-width="3" fill="none" />
  <path d="M220,120 Q230,110 240,120" stroke="#5e2f0d" stroke-width="3" fill="none" />

  <!-- Burnt Tip of Tail -->
  <path d="M200,210 Q190,200 185,210 Q190,220 200,215 Z" fill="#4a3728" />

</svg>
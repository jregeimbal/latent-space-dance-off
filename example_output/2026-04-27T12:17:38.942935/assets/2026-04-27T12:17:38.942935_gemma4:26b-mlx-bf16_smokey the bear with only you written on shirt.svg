<svg width="500" height="500" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
  <!-- Background: Forest Green -->
  <rect width="500" height="500" fill="#2d5a27" />
  
  <!-- Grass/Ground Decoration -->
  <line x1="0" y1="480" x2="500" y2="480" stroke="#1e3f1a" stroke-width="5" />
  <line x1="100" y1="485" x2="120" y2="460" stroke="#3d7a36" stroke-width="3" />
  <line x1="350" y1="485" x2="370" y2="460" stroke="#3d7a36" stroke-width="3" />
  <line x1="250" y1="490" x2="270" y2="465" stroke="#3d7a36" stroke-width="3" />

  <!-- Bear Body/Shoulders -->
  <path d="M100 500 Q100 300 250 300 Q400 300 400 500 Z" fill="#4b3621" />

  <!-- The Shirt (Yellow) -->
  <rect x="140" y="320" width="220" height="180" rx="15" fill="#ffcc00" />
  
  <!-- Text on Shirt -->
  <text x="250" y="410" font-family="Arial, sans-serif" font-weight="bold" font-size="32" text-anchor="middle" fill="#333">ONLY YOU</text>

  <!-- Bear Head -->
  <circle cx="250" cy="200" r="75" fill="#4b3621" />

  <!-- Ears -->
  <circle cx="185" cy="145" r="25" fill="#4b3621" />
  <circle cx="315" cy="145" r="25" fill="#4b3621" />

  <!-- Ranger Hat Crown -->
  <path d="M180 150 Q180 90 250 90 Q320 90 320 150 Z" fill="#795548" />
  
  <!-- Hat Brim (Ellipse) -->
  <ellipse cx="250" cy="155" rx="110" ry="25" fill="#5d4037" />

  <!-- Muzzle/Snout Area -->
  <ellipse cx="250" cy="225" rx="35" ry="28" fill="#6d4c41" />
  
  <!-- Nose -->
  <ellipse cx="250" cy="215" rx="12" ry="8" fill="#212121" />

  <!-- Eyes -->
  <circle cx="220" cy="190" r="7" fill="black" />
  <circle cx="280" cy="190" r="7" fill="black" />
  
  <!-- Eye highlights -->
  <circle cx="218" cy="188" r="2" fill="white" />
  <circle cx="278" cy="188" r="2" fill="white" />

</svg>
<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Sky -->
  <rect x="0" y="0" width="400" height="300" fill="#87CEEB" />
  
  <!-- Ground -->
  <rect x="0" y="300" width="400" height="100" fill="#4CAF50" />

  <!-- Tree Trunk (using line) -->
  <line x1="320" y1="300" x2="320" y2="150" stroke="#795548" stroke-width="15" />

  <!-- Smokey's Head -->
  <ellipse cx="200" cy="160" rx="90" ry="100" fill="#5D4037" />

  <!-- Ears -->
  <circle cx="110" cy="80" r="30" fill="#5D4037" />
  <circle cx="290" cy="80" r="30" fill="#5D4037" />
  
  <!-- Inner Ears -->
  <circle cx="110" cy="80" r="20" fill="#8D6E63" />
  <circle cx="290" cy="80" r="20" fill="#8D6E63" />

  <!-- Snout -->
  <ellipse cx="200" cy="210" rx="55" ry="45" fill="#D7CCC8" />

  <!-- Nose -->
  <ellipse cx="200" cy="195" rx="18" ry="12" fill="#000000" />

  <!-- Eyes -->
  <circle cx="165" cy="150" r="10" fill="#000000" />
  <circle cx="235" cy="150" r="10" fill="#000000" />
  <!-- Eye Shine -->
  <circle cx="168" cy="146" r="3" fill="#FFFFFF" />
  <circle cx="238" cy="146" r="3" fill="#FFFFFF" />

  <!-- Mouth -->
  <path d="M200 210 Q175 230 155 215 M200 210 Q225 230 245 215" stroke="#000000" stroke-width="3" fill="none" stroke-linecap="round" />

  <!-- Shirt Base -->
  <rect x="110" y="240" width="180" height="140" rx="20" ry="20" fill="#D32F2F" />
  
  <!-- Text: "with only" -->
  <text x="200" y="285" font-family="Arial, sans-serif" font-size="18" fill="white" text-anchor="middle" font-weight="bold">with only</text>
  
  <!-- Text: "you" -->
  <text x="200" y="315" font-family="Arial, sans-serif" font-size="24" fill="white" text-anchor="middle" font-weight="bold">you</text>

  <!-- Arms -->
  <ellipse cx="80" cy="290" rx="25" ry="70" fill="#5D4037" transform="rotate(-20 80 290)" />
  <ellipse cx="320" cy="290" rx="25" ry="70" fill="#5D4037" transform="rotate(20 320 290)" />

  <!-- Smoke Effect (Abstract Path) -->
  <path d="M150 100 Q180 50 200 100 T250 100" stroke="#E0E0E0" stroke-width="15" fill="none" stroke-linecap="round" opacity="0.6" />
  <path d="M160 120 Q190 70 210 120 T260 120" stroke="#F5F5F5" stroke-width="10" fill="none" stroke-linecap="round" opacity="0.8" />
</svg>
<svg viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Floor -->
  <rect x="0" y="400" width="500" height="100" fill="#6a4c93" />
  <rect x="0" y="0" width="500" height="400" fill="#f0f8ff" />

  <!-- Disco Lights (Lines) -->
  <line x1="250" y1="0" x2="200" y2="100" stroke="#ff9ff3" stroke-width="4" opacity="0.6" />
  <line x1="250" y1="0" x2="300" y2="120" stroke="#feca57" stroke-width="4" opacity="0.6" />
  <line x1="250" y1="0" x2="250" y2="150" stroke="#ff6b6b" stroke-width="4" opacity="0.6" />

  <!-- The Llama's Left Leg (Polyline) -->
  <polyline points="220,350 200,380 210,420" stroke="#ffffff" stroke-width="20" fill="none" stroke-linecap="round" />
  <!-- Left Shoe -->
  <path d="M205,415 Q200,440 230,435 L230,420 Z" fill="#3498db" stroke="#2c3e50" stroke-width="2"/>

  <!-- The Llama's Right Leg (Polyline) - Mid Air -->
  <polyline points="260,340 290,360 320,330" stroke="#ffffff" stroke-width="20" fill="none" stroke-linecap="round" />
  <!-- Right Shoe -->
  <path d="M315,325 Q315,350 350,340 L335,330 Z" fill="#e74c3c" stroke="#2c3e50" stroke-width="2"/>

  <!-- Body Base -->
  <rect x="180" y="200" width="160" height="180" rx="80" ry="80" fill="#ff9ff3" />
  
  <!-- Fluffy Texture (Paths) -->
  <path d="M180,220 Q200,240 190,260 Q210,280 195,300" stroke="#ff9ff3" stroke-width="10" fill="none"/>
  <path d="M320,220 Q300,240 310,260 Q290,280 305,300" stroke="#ff9ff3" stroke-width="10" fill="none"/>

  <!-- Right Arm (Rect) - The Disco Point -->
  <rect x="340" y="230" width="25" height="100" rx="12" ry="12" transform="rotate(45 352 280)" fill="#ffffff" stroke="#333" stroke-width="2" />
  
  <!-- Left Arm (Rect) - The Hip Hold -->
  <rect x="135" y="280" width="25" height="80" rx="12" ry="12" transform="rotate(-15 147 320)" fill="#ffffff" stroke="#333" stroke-width="2" />

  <!-- Neck (Ellipse/Path combination) -->
  <ellipse cx="250" cy="140" rx="40" ry="80" fill="#ffffff" />

  <!-- Head (Ellipse) -->
  <ellipse cx="250" cy="100" rx="55" ry="70" fill="#ffffff" />

  <!-- Ears (Polygon) -->
  <polygon points="200,60 215,30 230,60" fill="#ffffff" stroke="#333" stroke-width="1" />
  <polygon points="300,60 285,30 270,60" fill="#ffffff" stroke="#333" stroke-width="1" />
  
  <!-- Inner Ears (Small Rects) -->
  <rect x="213" y="45" width="4" height="10" rx="2" fill="#ff9ff3" />
  <rect x="283" y="45" width="4" height="10" rx="2" fill="#ff9ff3" />

  <!-- Snout Area (Path) -->
  <path d="M210,140 Q250,170 290,140 Q290,160 250,165 Q210,160 210,140" fill="#ffeaa7" />

  <!-- Eyes (Circles) -->
  <circle cx="225" cy="110" r="8" fill="#333" />
  <circle cx="275" cy="110" r="8" fill="#333" />
  
  <!-- Eye Sparkle (Circle) -->
  <circle cx="227" cy="108" r="2" fill="#fff" />
  <circle cx="277" cy="108" r="2" fill="#fff" />

  <!-- Sunglasses (Polygon & Line) -->
  <polygon points="205,105 240,105 220,135 205,130" fill="#333" />
  <polygon points="245,105 280,105 260,130 245,135" fill="#333" />
  <line x1="240" y1="105" x2="245" y2="105" stroke="#333" stroke-width="2" />

  <!-- Smile (Path) -->
  <path d="M230,150 Q250,165 270,150" stroke="#333" stroke-width="3" fill="none" />

  <!-- Star Burst (Polygon) - To make it cool -->
  <polygon points="420,50 430,80 450,60 440,90 470,90 440,110 460,140 430,120 420,150 410,120 380,140 400,110 370,90 400,90 410,60" fill="#feca57" opacity="0.8" />

</svg>
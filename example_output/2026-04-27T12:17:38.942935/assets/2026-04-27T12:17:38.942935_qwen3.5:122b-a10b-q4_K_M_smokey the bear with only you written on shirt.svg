<svg width="500" height="500" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="500" height="500" fill="#fdf6e3" />

  <!-- The Shirt (Body) -->
  <path d="M 100 450 Q 100 350 200 350 L 300 350 Q 400 350 400 450 L 400 500 L 100 500 Z" fill="#1a237e" />
  
  <!-- Text on Shirt -->
  <text x="250" y="450" font-family="Arial, sans-serif" font-size="40" font-weight="bold" fill="white" text-anchor="middle">only you</text>

  <!-- Bear Head (Base) -->
  <circle cx="250" cy="250" r="110" fill="#795548" />
  
  <!-- Ears -->
  <circle cx="150" cy="170" r="30" fill="#795548" />
  <circle cx="350" cy="170" r="30" fill="#795548" />
  <!-- Inner Ears -->
  <circle cx="150" cy="170" r="15" fill="#a1887f" />
  <circle cx="350" cy="170" r="15" fill="#a1887f" />

  <!-- Face Details -->
  <!-- Snout Area -->
  <ellipse cx="250" cy="280" rx="60" ry="50" fill="#d7ccc8" />
  
  <!-- Nose -->
  <ellipse cx="250" cy="250" rx="20" ry="15" fill="#3e2723" />
  
  <!-- Mouth -->
  <path d="M 220 290 Q 250 310 280 290" stroke="#3e2723" stroke-width="3" fill="none" />
  
  <!-- Eyes -->
  <circle cx="205" cy="230" r="12" fill="white" />
  <circle cx="205" cy="230" r="5" fill="black" />
  
  <circle cx="295" cy="230" r="12" fill="white" />
  <circle cx="295" cy="230" r="5" fill="black" />
  
  <!-- Eyebrows -->
  <line x1="190" y1="210" x2="220" y2="215" stroke="#5d4037" stroke-width="4" stroke-linecap="round" />
  <line x1="280" y1="215" x2="310" y2="210" stroke="#5d4037" stroke-width="4" stroke-linecap="round" />

  <!-- Ranger Hat -->
  <!-- Brim -->
  <ellipse cx="250" cy="215" rx="130" ry="35" fill="#1565c0" />
  <!-- Hat Top -->
  <path d="M 140 170 Q 140 100 250 100 Q 360 100 360 170 Q 250 170 140 170" fill="#1565c0" />
  <path d="M 250 100 Q 250 40 250 40" stroke="none" /> <!-- Invisible connector for logic if needed, but path is closed above -->
  
  <!-- Hat Band detail -->
  <rect x="140" y="170" width="220" height="10" fill="#0d47a1" />

</svg>